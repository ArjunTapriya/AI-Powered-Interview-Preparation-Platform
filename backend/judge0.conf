####################################
# Judge0 CE Configuration
# Docs: https://github.com/judge0/judge0/blob/master/judge0.conf
####################################

# Database
POSTGRES_HOST=judge0-db
POSTGRES_PORT=5432
POSTGRES_DB=judge0
POSTGRES_USER=judge0
POSTGRES_PASSWORD=judge0pass

# Redis
REDIS_HOST=judge0-redis
REDIS_PORT=6379
REDIS_PASSWORD=judge0pass

# Server
PORT=2358
USE_DOCS=false

# Execution limits (generous for dev)
CPU_TIME_LIMIT=10
CPU_EXTRA_TIME=1
WALL_TIME_LIMIT=20
MEMORY_LIMIT=512000
STACK_LIMIT=64000
MAX_PROCESSES_AND_OR_THREADS=60
ENABLE_PER_PROCESS_AND_THREAD_TIME_LIMIT=false
ENABLE_PER_PROCESS_AND_THREAD_MEMORY_LIMIT=false
MAX_FILE_SIZE=1024
NUMBER_OF_RUNS=1

# Auth — no token required for local dev
AUTHN_HEADER=
AUTHN_TOKEN=

# Workers
RAILS_ENV=production
